{% extends "base.html" %}

{% block content %}
<div id="password" class="page">
    <div class="card">
        <h1 class="card-title">🔑 Password Strength Analyzer</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <div>
                <h3 style="color: #667eea; margin-bottom: 1rem;">Analyze Password</h3>
                
                <div class="form-group">
                    <label>Enter Password to Analyze</label>
                    <input type="password" id="passwordInput" placeholder="Enter your password">
                </div>
                
                <button onclick="analyzePassword()">Analyze Password</button>
                <button onclick="generatePassword()" style="margin-left: 0.5rem; background: #27ae60;">Generate Strong Password</button>
                
                <div id="passwordLoading" class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
            
            <div>
                <h3 style="color: #667eea; margin-bottom: 1rem;">Password Strength Meter</h3>
                <div style="margin: 2rem 0;">
                    <div id="strengthMeter" style="width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden;">
                        <div id="strengthBar" style="width: 0%; height: 100%; background: #e74c3c; transition: all 0.3s;"></div>
                    </div>
                    <div id="strengthText" style="text-align: center; margin-top: 0.5rem; font-weight: bold;">-</div>
                </div>
            </div>
        </div>
        
        <div id="passwordResults" class="results">
            <h3 style="color: #667eea; margin-bottom: 1rem;">Analysis Results</h3>
            <div id="passwordContent"></div>
        </div>
    </div>
</div>

<script>
async function analyzePassword() {
    const password = document.getElementById('passwordInput').value;
    
    if (!password) {
        alert('Please enter a password');
        return;
    }
    
    const loading = document.getElementById('passwordLoading');
    const results = document.getElementById('passwordResults');
    const content = document.getElementById('passwordContent');
    
    showLoading(loading);
    
    try {
        const response = await fetch('/api/analyze-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password: password})
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            const analysis = data.data;
            updateStrengthMeter(analysis.score, analysis.strength);
            
            let html = '';
            html += '<div class="result-item"><span class="result-label">Password Length</span><span class="result-value">' + analysis.length + ' characters</span></div>';
            html += '<div class="result-item"><span class="result-label">Strength Level</span><span class="result-value" style="color: ' + getScoreColor(analysis.score) + ';">' + analysis.strength + '</span></div>';
            html += '<div class="result-item"><span class="result-label">Strength Score</span><span class="result-value">' + analysis.score + '/10</span></div>';
            html += '<div class="result-item"><span class="result-label">Entropy</span><span class="result-value">' + analysis.entropy.toFixed(2) + ' bits</span></div>';
            html += '<div class="result-item"><span class="result-label">Crack Time</span><span class="result-value">' + analysis.crack_time + '</span></div>';
            
            html += '<div style="border-top: 2px solid #e0e0e0; margin-top: 1rem; padding-top: 1rem;"><h4>Character Patterns:</h4>';
            html += '<div class="result-item"><span class="result-label">Uppercase Letters</span><span class="result-value">✔</span></div>';
            html += '<div class="result-item"><span class="result-label">Lowercase Letters</span><span class="result-value">✔</span></div>';
            html += '<div class="result-item"><span class="result-label">Digits</span><span class="result-value">✔</span></div>';
            html += '<div class="result-item"><span class="result-label">Special Characters</span><span class="result-value">✔</span></div>';
            html += '</div>';
            
            html += '<div style="border-top: 2px solid #e0e0e0; margin-top: 1rem; padding-top: 1rem;"><h4>Recommendations:</h4>';
            html += '<ul style="margin-left: 1.5rem;">';
            analysis.recommendations.forEach(rec => {
                html += '<li>' + rec + '</li>';
            });
            html += '</ul></div>';
            
            content.innerHTML = html;
            showResults(results, true);
        } else {
            content.innerHTML = '<div class="alert alert-danger">Error: ' + data.message + '</div>';
            showResults(results, true);
        }
    } catch (error) {
        content.innerHTML = '<div class="alert alert-danger">Error: ' + error.message + '</div>';
        showResults(results, true);
    } finally {
        hideLoading(loading);
    }
}

async function generatePassword() {
    const loading = document.getElementById('passwordLoading');
    const results = document.getElementById('passwordResults');
    const content = document.getElementById('passwordContent');
    
    showLoading(loading);
    
    try {
        const response = await fetch('/api/generate-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({length: 16})
        });
        
        const data = await response.json();
        
        if (data.status === 'success') {
            const pwd = data.data;
            document.getElementById('passwordInput').value = pwd.password;
            
            let html = '<div class="alert alert-success">';
            html += '<strong>Strong Password Generated!</strong><br>';
            html += 'Password: <code style="background: #f0f0f0; padding: 0.5rem; border-radius: 4px;">' + pwd.password + '</code><br>';
            html += 'Strength: ' + pwd.strength + ' (' + pwd.score + '/10)<br>';
            html += 'Entropy: ' + pwd.entropy.toFixed(2) + ' bits<br>';
            html += '</div>';
            
            updateStrengthMeter(pwd.score, pwd.strength);
            content.innerHTML = html;
            showResults(results, true);
        } else {
            content.innerHTML = '<div class="alert alert-danger">Error: ' + data.message + '</div>';
            showResults(results, true);
        }
    } catch (error) {
        content.innerHTML = '<div class="alert alert-danger">Error: ' + error.message + '</div>';
        showResults(results, true);
    } finally {
        hideLoading(loading);
    }
}

function updateStrengthMeter(score, strength) {
    let color = '#e74c3c';  // Red (weak)
    if (score >= 8) color = '#27ae60';  // Green (strong)
    else if (score >= 6) color = '#f39c12';  // Orange (fair)
    
    const bar = document.getElementById('strengthBar');
    const text = document.getElementById('strengthText');
    
    bar.style.width = (score * 10) + '%';
    bar.style.background = color;
    text.textContent = strength + ' (' + score + '/10)';
    text.style.color = color;
}

function getScoreColor(score) {
    if (score >= 8) return '#27ae60';
    if (score >= 6) return '#f39c12';
    return '#e74c3c';
}
</script>
{% endblock %}
